services:
  php:
    build: ./docker/php-fpm
    container_name: episciences-api_php
    user: "${DOCKER_USER:-www}"
    volumes:
      - .:/var/www/html
      - ./docker/php-fpm/php.ini:/usr/local/etc/php/php.ini
    working_dir: /var/www/html
    depends_on: []
    environment:
      - APP_ENV=${APP_ENV:-dev}
      - DATABASE_URL=mysql://episciences:episciences@db-episciences:3306/episciences
    networks:
      - epi-network

  apache:
    build: ./docker/apache
    container_name: episciences-api_apache
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/apache/vhost.conf:/usr/local/apache2/conf/vhost.conf
    depends_on:
      - php
    networks:
      - epi-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.epi-api-apache.loadbalancer.server.port=80"
      - "traefik.http.routers.epi-api.rule=Host(`api-dev.episciences.org`)"
      - "traefik.http.routers.epi-api.entrypoints=websecure"
      - "traefik.http.routers.epi-api.tls=true"
      - "traefik.http.routers.epi-api.service=epi-api-apache"


networks:
  epi-network:
    external: true
    name: epi-network